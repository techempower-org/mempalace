name: Tests

# Path-filter: skip the full workflow when only docs change (markdown
# under any path + the docs/ tree). Mixed PRs (docs + code) still run.
# workflow_dispatch lets us manually re-run the full matrix when needed.
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install -e ".[dev]"
      # cov-fail-under: 79 (was 80). The postgres backend code paths
      # only get covered in the test-postgres job (which has a service
      # container), not test-linux. Adding new postgres-specific code
      # therefore mechanically drops the test-linux number even when
      # the postgres job is at 100%. Tracking issue to combine the two
      # jobs' coverage artifacts so the bar stays meaningful at 80%+.
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=79 --durations=10

  # Windows + macOS run only on manual dispatch (Actions budget — Windows
  # is 2x Linux billing, macOS is 10x). Trigger via Actions tab → "Tests"
  # → Run workflow when a release or platform-sensitive change needs the
  # cross-platform pass.
  test-windows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
      - run: pip install -e ".[dev]"
      # cov-fail-under: 79 (was 80). The postgres backend code paths
      # only get covered in the test-postgres job (which has a service
      # container), not test-linux. Adding new postgres-specific code
      # therefore mechanically drops the test-linux number even when
      # the postgres job is at 100%. Tracking issue to combine the two
      # jobs' coverage artifacts so the bar stays meaningful at 80%+.
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=79 --durations=10

  test-macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
      - run: pip install -e ".[dev]"
      # cov-fail-under: 79 (was 80). The postgres backend code paths
      # only get covered in the test-postgres job (which has a service
      # container), not test-linux. Adding new postgres-specific code
      # therefore mechanically drops the test-linux number even when
      # the postgres job is at 100%. Tracking issue to combine the two
      # jobs' coverage artifacts so the bar stays meaningful at 80%+.
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=79 --durations=10
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install "ruff>=0.4.0,<0.5"
      - run: ruff check .
      - run: ruff format --check .

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mempalace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -e ".[dev,postgres]"
      - name: Create pgvector extension
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/mempalace_test
        run: |
          python - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["PGURL"])
          conn.autocommit = True
          conn.cursor().execute("CREATE EXTENSION IF NOT EXISTS vector")
          print("vector extension ready")
          PY
      - name: Run postgres backend tests
        env:
          TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/mempalace_test
        run: python -m pytest tests/test_backends_postgres.py -v
